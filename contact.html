<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Contact Us - AI Expense Pro</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    body {
      height: 100vh;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      display: flex;
      justify-content: center;
      align-items: center;
      color: #e2e8f0;
    }

    .container {
      width: 90%;
      max-width: 500px;
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(12px);
      border-radius: 16px;
      padding: 30px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.4);
    }

    h1 {
      text-align: center;
      margin-bottom: 10px;
      font-weight: 600;
      color: #60a5fa;
    }

    p {
      text-align: center;
      margin-bottom: 20px;
      font-size: 14px;
      color: #94a3b8;
    }

    input, textarea {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border-radius: 10px;
      border: none;
      outline: none;
      background: rgba(255,255,255,0.1);
      color: #fff;
    }

    textarea {
      resize: none;
      height: 100px;
    }

    .btn {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 10px;
      font-weight: bold;
      cursor: pointer;
      transition: 0.3s;
      margin-top: 10px;
    }

    .send-btn {
      background: linear-gradient(135deg, #6c63ff, #00c6ff);
      color: white;
    }

    .mail-btn {
      background: linear-gradient(135deg, #38bdf8, #60a5fa);
      color: white;
    }

    .btn:hover {
      opacity: 0.85;
    }

    .footer {
      text-align: center;
      margin-top: 15px;
      font-size: 12px;
      color: #94a3b8;
    }

  </style>
</head>

<body>

<div class="container">
  <h1>Contact Us</h1>
  <p>We’d love to hear from you 💬</p>

  <!-- Contact Form -->
  <form action="https://formspree.io/f/YOUR_FORM_ID" method="POST">
    <input type="text" name="name" placeholder="Your Name" required>
    <input type="email" name="email" placeholder="Your Email" required>
    <textarea name="message" placeholder="Your Message" required></textarea>

    <button class="btn send-btn" type="submit">Send Message 🚀</button>
  </form>

  <!-- Direct Email Button -->
  <button class="btn mail-btn"
    onclick="window.location.href='mailto:parmar.yash1995@gmail.com?subject=Support Request&body=Hello Team,'">
    Contact Support 📩
  </button>

  <div class="footer">
    © 2026 AI Expense Pro
  </div>
</div>

</body>
</html>
